name: Build & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Build registry
      - run: npx tsx scripts/build-registry.ts
      - run: npx tsx scripts/validate-registry.ts

      # Build Storybook (read-only docs)
      - run: npm run build-storybook

      # Combine into a single Pages artifact:
      #   /              → registry (registry.json, r/*.json)
      #   /storybook/    → Storybook static site
      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r registry/* _site/
          cp -r storybook-static _site/storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
